<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Buddy Welcome</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  background:#0f172a;
  color:white;
}

/* CLOCK LEFT */
#clock{
  position:absolute;
  top:20px;
  left:20px;
  padding:12px 16px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  border-radius:12px;
  font-size:14px;
  z-index:10;
}

/* TOP BUTTONS RIGHT */
.top{
  position:absolute;
  top:20px;
  right:20px;
  display:flex;
  gap:10px;
  z-index:10;
}

.top button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#38bdf8;
  color:white;
  font-weight:bold;
}

/* MAIN CARD */
.container{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.05);
  padding:50px;
  border-radius:20px;
  text-align:center;
  max-width:500px;
  width:90%;
  z-index:5;
}

h1{
  font-size:2.5rem;
  margin-bottom:10px;
  background:linear-gradient(90deg,#4f46e5,#06b6d4);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

button.main{
  margin-top:20px;
  padding:12px 30px;
  border:none;
  border-radius:30px;
  background:linear-gradient(90deg,#4f46e5,#06b6d4);
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- CLOCK -->
<div id="clock"></div>

<!-- BUTTONS (REGISTER FIXED) -->
<div class="top">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">
  <div class="card">
    <h1>Welcome To Campus Buddy</h1>
    <p>Smart Campus Management System</p>
    <button class="main" onclick="enterSite()">Enter</button>
  </div>
</div>

<script>

/* CLOCK */
function updateClock(){
  let now = new Date();
  document.getElementById("clock").innerHTML =
    "🕒 " + now.toLocaleTimeString() +
    "<br>📅 " + now.toLocaleDateString();
}
setInterval(updateClock,1000);
updateClock();

/* REGISTER */
function register(){
  let u = prompt("Create Username:");
  let p = prompt("Create Password:");

  if(!u || !p){
    alert("Please fill both fields!");
    return;
  }

  localStorage.setItem("user",u);
  localStorage.setItem("pass",p);
  localStorage.setItem("registered","yes");

  alert("Registration Successful ✅");
}

/* LOGIN */
function login(){
  if(!localStorage.getItem("registered")){
    alert("⚠️ Please register first!");
    return;
  }

  let u = prompt("Username:");
  let p = prompt("Password:");

  if(u === localStorage.getItem("user") &&
     p === localStorage.getItem("pass")){
    localStorage.setItem("role","admin");
    alert("Login Successful ✅");
  }else{
    alert("Wrong credentials ❌");
  }
}

/* LOGOUT */
function logout(){
  localStorage.setItem("role","user");
  alert("Logged out");
}

/* ENTER */
function enterSite(){
  if(!localStorage.getItem("registered")){
    alert("⚠️ Please register first!");
    return;
  }

  window.location.href="welcom.html";
}

</script>

</body>
</html>
