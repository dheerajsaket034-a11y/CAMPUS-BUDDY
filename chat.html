<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CampusBuddy Chatbot</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  overflow: hidden;
  background: #020617; /* deep dark */
}

/* Canvas */
#bg-animation {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* Chat UI */
.chat-container {
  width: 350px;
  margin: 50px auto;
  background: rgba(15, 23, 42, 0.8);
  backdrop-filter: blur(15px);
  border-radius: 15px;
  padding: 15px;
  box-shadow: 0 0 30px rgba(0,0,0,0.8);
  position: relative;
  z-index: 1;
}

#chat-box {
  
  overflow-y: auto;
}
h2 {
  text-align: center;
}

#chat-box {
  height: 400px;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  padding: 10px;
  margin: 8px;
  border-radius: 12px;
  max-width: 70%;
  animation: fadeIn 0.3s ease-in;
}

.user {
  background: #0ea5e9;
  margin-left: auto;
}

.bot {
  background: #1e293b;
}

.input-area {
  display: flex;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  outline: none;
  background: #0f172a;
  color: white;
}

button {
  padding: 10px;
  margin-left: 5px;
  border: none;
  border-radius: 8px;
  background: #0ea5e9;
  cursor: pointer;
}

button:hover {
  background: #0284c7;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<canvas id="bg-animation"></canvas>

<div class="chat-container">
  <h2>🎓 CampusBuddy</h2>

  <div id="chat-box"></div>

  <div class="input-area">
    <input id="user-input" placeholder="Ask something...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
// ===== CHAT =====
const chatBox = document.getElementById("chat-box");

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function botReply(input) {
  input = input.toLowerCase();

  if (input.includes("admission")) return "Admissions start around May.";
  if (input.includes("fees")) return "Fees approx ₹50k–₹1.5L per year.";
  if (input.includes("courses")) return "B.Tech, BCA, BBA, B.pharma, MBA available.";
  if (input.includes("placement")) return "Avg package ₹3–8 LPA.";
  if (input.includes("hostel")) return "Hostel + WiFi + mess available.";

  if (input.includes("hi") || input.includes("hello"))
    return "Hey 👋 I'm CampusBuddy!";
  if (input.includes("joke"))
    return "Exam se darr nahi lagta... backlog se lagta hai 😂";

  return "Ask about admission, fees, or campus 😄";
}

function sendMessage() {
  const inputField = document.getElementById("user-input");
  const message = inputField.value;

  if (!message) return;

  addMessage(message, "user");
  inputField.value = "";

  const typing = document.createElement("div");
  typing.className = "msg bot";
  typing.innerText = "Typing...";
  chatBox.appendChild(typing);

  setTimeout(() => {
    typing.remove();
    addMessage(botReply(message), "bot");
  }, 600);
}

document.getElementById("user-input").addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});


// ===== ADVANCED DARK ANIMATION =====
const canvas = document.getElementById("bg-animation");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 100; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    dx: Math.random() * 0.6 - 0.3,
    dy: Math.random() * 0.6 - 0.3
  });
}

function animate() {
  ctx.fillStyle = "rgba(2,6,23,0.3)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  particles.forEach((p, i) => {
    p.x += p.dx;
    p.y += p.dy;

    if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.dy *= -1;

    // particle glow
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
    ctx.fillStyle = "#0ea5e9";
    ctx.fill();

    // connecting lines
    for (let j = i + 1; j < particles.length; j++) {
      let dx = p.x - particles[j].x;
      let dy = p.y - particles[j].y;
      let dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < 120) {
        ctx.strokeStyle = "rgba(14,165,233,0.15)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  });

  requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
