<!DOCTYPE html>
<html>
<head>
<title>Notice Board</title>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

.card{
  background:#1e293b;
  padding:15px;
  margin:10px auto;
  width:60%;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>📢 Notice Board</h2>

<div id="list"></div>

<script>
function load(){
  let notices = JSON.parse(localStorage.getItem("notices")) || [];
  let list = document.getElementById("list");

  list.innerHTML="";

  if(notices.length === 0){
    list.innerHTML="<p>No notices available</p>";
    return;
  }

  notices.forEach(n=>{
    list.innerHTML += `
      <div class="card">
        <b>${n.text}</b><br>
        <small>${n.time}</small>
      </div>
    `;
  });
}

load();
</script>

</body>
</html>
